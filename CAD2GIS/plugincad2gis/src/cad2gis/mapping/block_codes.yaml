# Reviewed opaque block-code table (story G8b) — the FROZEN output of OFFLINE analysis.
#
# On the real DS-04 comms drawing, 2,170 INSERTs on the 通信 layers resolve to only 23 block
# codes. Named well blocks (末端井…) are handled by the manhole rule in comms_symbols.yaml.
# The remaining OPAQUE gc* codes are NOT self-describing — layer + block-code cannot classify
# them. Evidence (build/unmapped_probe.json): the NEAREST TEXT label disambiguates them:
#
#   gc170  (464x, fp {CIRCLE:1})     nearest text 3孔PVC110 / 3孔BD100  -> DUCT cross-section
#   gc013a/b/c (POLYLINE/HATCH)      nearest text 3孔PVC110 / 3孔BD100  -> DUCT cross-section
#   gc043  (513x, fp {LINE:2,CIRCLE:1}) nearest text 地砖 / 水泥 / 砼   -> PAVING (non-comms)
#   gc041/gc133/gc050                 nearest text 地砖 / 水泥          -> PAVING (non-comms)
#
# This table is authored by OFFLINE review (human, optionally AI-proposed) and FROZEN here.
# It is NOT edited at runtime and contains NO LLM call in the conversion route — the runtime
# stays 100% deterministic/reproducible, protecting the accuracy claim. Each entry records the
# evidence that justified the decision so the mapping is auditable.
#
# Schema per code:
#   code:            the opaque block name (case-insensitive match)
#   facility:        target feature class, or `null` to explicitly reject (keeps it unmapped)
#   requires_text:   optional regex the nearest-text label must match to confirm the mapping;
#                    if set and the label doesn't match, the code is left unmapped (evidence-gated)
#   evidence:        human note on why (nearest-text stats + fingerprint from the probe)
version: 1
codes:
  # ---- DUCT cross-section symbols (comms civil works) — confirmed by 孔/PVC/BD duct labels ----
  - code: gc170
    facility: duct
    requires_text: "孔|PVC|BD|管"
    evidence: "464x on 通信; fp {CIRCLE:1}; nearest 3孔PVC110/3孔BD100 -> duct cross-section"
  - code: gc013a
    facility: duct
    requires_text: "孔|PVC|BD|管"
    evidence: "134x; fp {LINE:1,POLYLINE:2}; nearest 3孔PVC110 -> duct cross-section"
  - code: gc013b
    facility: duct
    requires_text: "孔|PVC|BD|管"
    evidence: "366x; fp {LINE:1,POLYLINE:1}; nearest 3孔PVC110/3孔BD100 -> duct cross-section"
  - code: gc013c
    facility: duct
    requires_text: "孔|PVC|BD|管"
    evidence: "232x; fp {CIRCLE:1,POLYLINE:1,HATCH:1}; nearest 3孔PVC110/3孔BD100 -> duct"

  # ---- PAVING / surface-restoration symbols — NON-comms, explicitly rejected ----
  # These sit on the 通信 layer but are road-surface restoration marks (地砖=paving tile,
  # 水泥/砼=concrete). Emitting them as comms features would corrupt the network + accuracy.
  - code: gc043
    facility: null
    evidence: "513x; nearest 地砖(35)/水泥/砖 -> paving, non-comms"
  - code: gc041
    facility: null
    evidence: "67x; fp {LINE:6}; nearest 地砖 -> paving, non-comms"
  - code: gc124
    facility: null
    evidence: "496x on ZBTZ; fp {LINE:4}; nearest 砖(24)/坝/水泥/地砖/砼 -> paving, non-comms"
  - code: gc326
    facility: null
    evidence: "382x on ZBTZ; fp {CIRCLE:1}; nearest 栎7/地砖 -> tree/paving marker, non-comms"
  - code: gc122
    facility: null
    evidence: "324x on ZBTZ; fp {CIRCLE:1}; nearest 地砖(19)/栎 -> paving/tree, non-comms"
  - code: gc133
    facility: null
    evidence: "53x; nearest 地砖 -> paving, non-comms"
  - code: gc048
    facility: null
    evidence: "36x; ambiguous WC-/DN300 pipe labels but no comms 孔 signal -> leave unmapped"
  - code: gc049
    facility: null
    evidence: "25x; fp {LINE:7}; mixed 3孔PVC110/DN400 -> ambiguous, leave for review"
  - code: gc050
    facility: null
    evidence: "7x; nearest 地砖/入地 -> paving, non-comms"
